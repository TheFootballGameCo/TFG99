<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TFG Manager: Ninety Nine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F1E8; --navy:#1D2433; --navyBG:#1D2433; --green:#2E5A44; --burgundy:#7B2432;
  --gold:#D4A52A; --grey:#E3E3E3; --card:#FFFCF5;
  --navy-soft:#3A4458; --green-soft:#3d7257; --ink:#1D2433;
  --radius:14px; --shadow:0 2px 10px rgba(29,36,51,.08), 0 1px 3px rgba(29,36,51,.06);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.45;
  background-image:radial-gradient(rgba(29,36,51,.025) 1px, transparent 1px);
  background-size:22px 22px;
}
h1,h2,h3,h4,.head{font-family:'Oswald',sans-serif; letter-spacing:.02em; margin:0; text-transform:uppercase;}
button{font-family:inherit; cursor:pointer; border:none;}
select,input{font-family:inherit; font-size:14px;}
a{color:var(--green);}

/* ---------- layout ---------- */
#app{max-width:1020px; margin:0 auto; padding:0 14px 90px;}
.topbar{
  position:sticky; top:0; z-index:50; background:var(--navyBG); color:#fff;
  margin:0 -14px 16px; padding:10px 16px; display:flex; align-items:center; gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.topbar .brand{font-family:'Oswald'; font-weight:700; font-size:17px; text-transform:uppercase; letter-spacing:.04em; color:var(--gold); white-space:nowrap;}
.topbar .clubname{font-family:'Oswald'; font-size:15px; color:#fff; opacity:.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.topbar .spacer{flex:1;}
.topbar .gw{font-size:12px; color:#cfd6e4; white-space:nowrap;}

nav.mainnav{display:flex; gap:4px; margin:0 -14px 18px; padding:0 14px; overflow-x:auto; scrollbar-width:none;}
nav.mainnav::-webkit-scrollbar{display:none;}
nav.mainnav button{
  background:transparent; color:var(--navy); font-family:'Oswald'; font-size:14px; letter-spacing:.04em;
  text-transform:uppercase; padding:9px 14px; border-radius:10px; white-space:nowrap;
}
nav.mainnav button.active{background:var(--navyBG); color:var(--gold);}
nav.mainnav button:hover:not(.active){background:rgba(29,36,51,.08);}

@media (max-width:640px){
  #app{padding-bottom:84px;}
  nav.mainnav{
    position:fixed; bottom:0; left:0; right:0; margin:0; z-index:60;
    background:var(--navyBG); padding:6px 6px calc(6px + env(safe-area-inset-bottom)); justify-content:space-around;
    box-shadow:0 -2px 10px rgba(0,0,0,.2);
  }
  nav.mainnav button{color:#cfd6e4; font-size:11px; padding:8px 7px;}
  nav.mainnav button.active{background:rgba(212,165,42,.16); color:var(--gold);}
}

/* ---------- cards ---------- */
.card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; margin-bottom:14px; border:1px solid rgba(29,36,51,.05);}
.card h3{font-size:15px; color:var(--green); border-bottom:2px solid var(--grey); padding-bottom:8px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;}
.card h3 .sub{font-family:'Inter'; font-size:12px; color:#8a8f9c; text-transform:none; letter-spacing:0; font-weight:500;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:760px){.grid2{grid-template-columns:1fr;}}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  background:var(--navyBG); color:#fff; font-family:'Oswald'; text-transform:uppercase; letter-spacing:.05em;
  font-size:15px; padding:12px 22px; border-radius:12px; transition:transform .06s, opacity .15s;
}
.btn:active{transform:scale(.97);}
.btn.green{background:var(--green);}
.btn.burgundy{background:var(--burgundy);}
.btn.gold{background:var(--gold); color:var(--navyBG);}
.btn.ghost{background:transparent; color:var(--navy); border:2px solid var(--navy);}
.btn.small{font-size:12px; padding:7px 13px; border-radius:9px;}
.btn.big{font-size:18px; padding:16px 30px; width:100%;}
.btn:disabled{opacity:.4; cursor:default;}

/* ---------- tables ---------- */
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{font-family:'Oswald'; font-weight:500; text-transform:uppercase; font-size:11.5px; letter-spacing:.05em; color:#6d7383; text-align:left; padding:6px 8px; border-bottom:2px solid var(--grey); white-space:nowrap;}
td{padding:7px 8px; border-bottom:1px solid rgba(29,36,51,.07); vertical-align:middle;}
tr.clickable{cursor:pointer;}
tr.clickable:hover{background:rgba(46,90,68,.06);}
tr.me{background:rgba(212,165,42,.13);}
td.num,th.num{text-align:right; font-variant-numeric:tabular-nums;}
td.ctr,th.ctr{text-align:center;}
.posbadge{display:inline-block; background:var(--navyBG); color:#fff; font-family:'Oswald'; font-size:10.5px; padding:2px 6px; border-radius:5px; letter-spacing:.04em;}
.posbadge.gk{background:var(--gold); color:var(--navyBG);}
.posbadge.def{background:var(--green);}
.posbadge.mid{background:var(--navy);}
.posbadge.att{background:var(--burgundy);}

/* ---------- bits ---------- */
.statpill{display:inline-block; min-width:26px; text-align:center; font-weight:600; font-size:12.5px; border-radius:6px; padding:2px 5px; font-variant-numeric:tabular-nums;}
.s-hi{background:rgba(46,90,68,.16); color:var(--green);}
.s-mid{background:rgba(212,165,42,.2); color:#8a6a12;}
.s-lo{background:rgba(123,36,50,.13); color:var(--burgundy);}
.formdot{display:inline-block; width:18px; height:18px; line-height:18px; border-radius:5px; color:#fff; font-size:10px; font-weight:700; text-align:center; margin-right:2px; font-family:'Oswald';}
.fW{background:var(--green);} .fD{background:#9aa0ad;} .fL{background:var(--burgundy);}
.tag{display:inline-block; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; background:var(--grey); color:var(--navy);}
.tag.inj{background:rgba(123,36,50,.14); color:var(--burgundy);}
.tag.listed{background:rgba(212,165,42,.25); color:#7a5d10;}
.muted{color:#8a8f9c; font-size:12.5px;}
.newsitem{padding:9px 0; border-bottom:1px solid rgba(29,36,51,.07); font-size:13.5px;}
.newsitem:last-child{border-bottom:none;}
.newsitem .d{font-family:'Oswald'; font-size:11px; color:var(--burgundy); letter-spacing:.05em; margin-right:6px;}

/* ---------- landing ---------- */
.landing{min-height:92vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px 10px;}
.landing .crest{
  width:92px; height:108px; margin-bottom:22px; background:var(--navyBG); color:var(--gold);
  clip-path:polygon(0 0,100% 0,100% 72%,50% 100%,0 72%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Oswald';
}
.landing .crest .yr{font-size:30px; font-weight:700; line-height:1;}
.landing .crest .lbl{font-size:10px; letter-spacing:.2em; color:#fff; margin-top:4px;}
.landing h1{font-size:clamp(34px,7vw,58px); color:var(--navy); line-height:1.04;}
.landing h1 .nn{color:var(--burgundy);}
.landing .sub{font-size:16px; color:#5b6170; margin:14px 0 30px; max-width:430px;}
.landing .btns{display:flex; flex-direction:column; gap:11px; width:min(310px,86vw);}
.landing .foot{margin-top:34px; font-size:12px; color:#9aa0ad;}

/* ---------- club select ---------- */
.clubgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:12px;}
.clubcard{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px; cursor:pointer; border:2px solid transparent; transition:border-color .12s, transform .08s;}
.clubcard:hover{border-color:var(--green); transform:translateY(-1px);}
.clubcard .nm{font-family:'Oswald'; font-size:17px; text-transform:uppercase;}
.clubcard .st{font-size:12px; color:#8a8f9c; margin:2px 0 8px;}
.clubcard .meta{display:flex; gap:6px; flex-wrap:wrap;}
.starrow{color:var(--gold); font-size:13px; letter-spacing:1px;}

/* ---------- pitch / XI ---------- */
.xirow{display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(29,36,51,.06);}
.xirow select{flex:1; padding:9px 10px; border-radius:9px; border:1.5px solid var(--grey); background:#fff; min-width:0;}
.xirow .slotpos{width:42px; flex-shrink:0;}
.tacrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid rgba(29,36,51,.06); flex-wrap:wrap;}
.tacrow .lbl{font-family:'Oswald'; font-size:13px; text-transform:uppercase; color:var(--navy);}
.seg{display:flex; background:var(--grey); border-radius:9px; padding:3px; gap:2px;}
.seg button{background:transparent; border-radius:7px; font-size:12px; font-weight:600; padding:6px 11px; color:#5b6170;}
.seg button.on{background:var(--navyBG); color:#fff;}

/* ---------- match report ---------- */
.scoreline{display:flex; align-items:center; justify-content:center; gap:14px; padding:14px 0 6px; text-align:center;}
.scoreline .t{font-family:'Oswald'; font-size:clamp(16px,3.4vw,23px); text-transform:uppercase; flex:1;}
.scoreline .s{font-family:'Oswald'; font-size:clamp(30px,6vw,44px); font-weight:700; background:var(--navyBG); color:#fff; border-radius:12px; padding:4px 18px; min-width:108px;}
.scorers{display:flex; gap:10px; font-size:12.5px; color:#5b6170; margin-bottom:10px;}
.scorers>div{flex:1;}
.scorers .home{text-align:right;}
.eventline{font-size:13.5px; padding:6px 8px; border-radius:8px; margin-bottom:3px; font-variant-numeric:tabular-nums;}
.eventline.goal{background:rgba(46,90,68,.1); font-weight:600;}
.eventline.goal.them{background:rgba(123,36,50,.09);}
.eventline.card-ev{background:rgba(212,165,42,.12);}
.eventline.inj{background:rgba(123,36,50,.07);}
.eventline .min{display:inline-block; width:34px; font-family:'Oswald'; color:var(--burgundy); font-size:12px;}
.ratingsgrid{display:grid; grid-template-columns:1fr auto auto; gap:2px 10px; font-size:13px;}

/* attribute bars */
.attrrow{display:grid; grid-template-columns:90px 1fr 28px; align-items:center; gap:8px; font-size:12.5px; padding:2.5px 0;}
.attrbar{height:8px; border-radius:5px; background:var(--grey); overflow:hidden;}
.attrbar i{display:block; height:100%; border-radius:5px;}

/* modal */
.modalwrap{position:fixed; inset:0; background:rgba(29,36,51,.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px;}
.modal{background:var(--card); border-radius:16px; max-width:560px; width:100%; max-height:88vh; overflow-y:auto; padding:20px 22px; box-shadow:0 10px 40px rgba(0,0,0,.3);}
.modal .closex{float:right; background:var(--grey); border-radius:8px; width:30px; height:30px; font-size:15px; font-weight:700; color:var(--navy);}

.bigstat{text-align:center; padding:8px 4px;}
.bigstat .v{font-family:'Oswald'; font-size:24px; font-weight:600; color:var(--navy);}
.bigstat .l{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#8a8f9c;}
.statgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:4px;}

.searchbar{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
.searchbar input,.searchbar select{padding:9px 12px; border-radius:9px; border:1.5px solid var(--grey); background:#fff;}
.searchbar input{flex:1; min-width:140px;}

.confbar{height:10px; border-radius:6px; background:var(--grey); overflow:hidden; margin-top:4px;}
.confbar i{display:block; height:100%; border-radius:6px;}

/* retro tactics board */
.pitch{position:relative;width:100%;max-width:400px;margin:4px auto 12px;aspect-ratio:3/3.7;border-radius:12px;overflow:hidden;
  background:repeating-linear-gradient(0deg,#39684f 0 10%,#2E5A44 10% 20%);border:2px solid #24493a;box-shadow:inset 0 0 24px rgba(0,0,0,.18);}
.pitch .pl{position:absolute;border:1.5px solid rgba(255,252,245,.4);pointer-events:none;}
.ptoken{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;width:74px;z-index:2;}
.ptoken .disc{width:37px;height:37px;border-radius:50%;background:var(--navyBG);border:2px solid var(--gold);color:#fff;
  font-family:'Oswald';font-size:13px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 2px 6px rgba(0,0,0,.35);transition:transform .08s;}
.ptoken:hover .disc{transform:scale(1.1);}
.ptoken.empty .disc{background:rgba(255,252,245,.22);border-style:dashed;}
.ptoken .nm{font-size:10px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.75);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.ptoken .ps{font-size:9px;color:var(--gold);text-shadow:0 1px 2px rgba(0,0,0,.6);font-family:'Oswald';letter-spacing:.05em;}
.pickrow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid rgba(29,36,51,.07);cursor:pointer;border-radius:8px;}
.pickrow:hover{background:rgba(46,90,68,.07);}
.pickrow.current{background:rgba(212,165,42,.14);}
.fadein{animation:fade .18s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
.toast{
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:200;
  background:var(--navyBG); color:#fff; padding:11px 20px; border-radius:11px; font-size:13.5px;
  box-shadow:0 4px 18px rgba(0,0,0,.3); animation:fade .2s ease;
}

/* ---------- dark mode ---------- */
body.dark{
  --cream:#141926; --navy:#EDE9DD; --green:#6FBF92; --burgundy:#E08A96;
  --grey:#2A3447; --card:#1C2333; --ink:#E8E5DB;
  --navy-soft:#A9B2C6; --green-soft:#6FBF92;
  --shadow:0 2px 10px rgba(0,0,0,.4), 0 1px 3px rgba(0,0,0,.3);
  background-image:radial-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
}
body.dark .card{border-color:rgba(255,255,255,.06);}
body.dark td{border-bottom-color:rgba(255,255,255,.07);}
body.dark th{color:#8d94a6; border-bottom-color:var(--grey);}
body.dark .muted{color:#98a0b3;}
body.dark .topbar{background:#10141f;}
body.dark nav.mainnav button.active{background:#0F1420;}
body.dark nav.mainnav button:hover{background:rgba(255,255,255,.07);}
body.dark select,body.dark input{background:#10141f; color:var(--ink); border-color:#3A4458;}
body.dark .xirow select,body.dark .searchbar input,body.dark .searchbar select{background:#10141f; color:var(--ink); border-color:#3A4458;}
body.dark .seg button.on{background:var(--gold); color:#10141f;}
body.dark .s-hi{background:rgba(111,191,146,.15); color:#7CC9A0;}
body.dark .s-mid{background:rgba(212,165,42,.18); color:#D9B564;}
body.dark .s-lo{background:rgba(224,138,150,.14); color:#E08A96;}
body.dark .newsitem{border-bottom-color:rgba(255,255,255,.07);}
body.dark .xirow{border-bottom-color:rgba(255,255,255,.06);}
body.dark .tacrow{border-bottom-color:rgba(255,255,255,.06);}
body.dark .pickrow{border-bottom-color:rgba(255,255,255,.08);}
body.dark .pickrow:hover{background:rgba(111,191,146,.1);}
body.dark tr.clickable:hover{background:rgba(255,255,255,.05);}
body.dark .scorers{color:#a4abbe;}
body.dark .landing .foot{color:#6d7588;}
body.dark .modalwrap{background:rgba(0,0,0,.55);}
body.dark .modal .closex{color:var(--navy);}
body.dark .btn.ghost{color:var(--navy); border-color:#3A4458;}

/* theme toggle */
.themetoggle{display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;}
.tswitch{position:relative; width:40px; height:22px; border-radius:11px; background:rgba(110,118,135,.45); transition:background .2s; flex-shrink:0;}
.tswitch i{position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left .2s; font-style:normal; display:flex; align-items:center; justify-content:center; font-size:11px; line-height:1;}
.tswitch i::after{content:'☀'; color:#b8860b;}
body.dark .tswitch{background:rgba(212,165,42,.5);}
body.dark .tswitch i{left:20px; background:#1D2433;}
body.dark .tswitch i::after{content:'☾'; color:#D4A52A;}
.themetoggle.floating{position:fixed; top:14px; right:14px; z-index:60;}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* =========================================================
   TFG MANAGER: NINETY NINE
   A fast-play retro Premier League management game.
   Season 1999/2000. No official assets. All vanilla JS.
   ========================================================= */

/* ---------- seeded RNG (deterministic player generation) ---------- */
function strHash(s){let h=1779033703;for(let i=0;i<s.length;i++){h=Math.imul(h^s.charCodeAt(i),3432918353);h=h<<13|h>>>19;}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function rnd(){return Math.random();}
function ri(a,b){return a+Math.floor(rnd()*(b-a+1));}
function pick(arr){return arr[Math.floor(rnd()*arr.length)];}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* ---------- DATA: clubs ---------- */
/* rep 1-20 drives expectations, budget, attendances */
const CLUBS=[
{id:"arsenal",name:"Arsenal",short:"ARS",stadium:"Highbury",cap:38000,rep:18,budget:40000000,style:"technical",formation:"4-4-2"},
{id:"villa",name:"Aston Villa",short:"AVL",stadium:"Villa Park",cap:39000,rep:14,budget:28000000,style:"balanced",formation:"3-5-2"},
{id:"bradford",name:"Bradford City",short:"BRA",stadium:"Valley Parade",cap:18000,rep:8,budget:8000000,style:"direct",formation:"4-4-2"},
{id:"chelsea",name:"Chelsea",short:"CHE",stadium:"Stamford Bridge",cap:35000,rep:16,budget:38000000,style:"technical",formation:"4-4-2"},
{id:"coventry",name:"Coventry City",short:"COV",stadium:"Highfield Road",cap:23000,rep:10,budget:15000000,style:"balanced",formation:"4-4-2"},
{id:"derby",name:"Derby County",short:"DER",stadium:"Pride Park",cap:33000,rep:10,budget:13000000,style:"balanced",formation:"4-4-2"},
{id:"everton",name:"Everton",short:"EVE",stadium:"Goodison Park",cap:40000,rep:12,budget:17000000,style:"direct",formation:"4-4-2"},
{id:"leeds",name:"Leeds United",short:"LEE",stadium:"Elland Road",cap:40000,rep:15,budget:30000000,style:"pressing",formation:"4-4-2"},
{id:"leicester",name:"Leicester City",short:"LEI",stadium:"Filbert Street",cap:22000,rep:11,budget:15000000,style:"direct",formation:"3-5-2"},
{id:"liverpool",name:"Liverpool",short:"LIV",stadium:"Anfield",cap:45000,rep:17,budget:38000000,style:"technical",formation:"4-4-2"},
{id:"manutd",name:"Manchester United",short:"MUN",stadium:"Old Trafford",cap:61000,rep:20,budget:50000000,style:"attacking",formation:"4-4-2"},
{id:"boro",name:"Middlesbrough",short:"MID",stadium:"Riverside Stadium",cap:35000,rep:11,budget:19000000,style:"balanced",formation:"4-4-2"},
{id:"newcastle",name:"Newcastle United",short:"NEW",stadium:"St James' Park",cap:52000,rep:15,budget:28000000,style:"attacking",formation:"4-4-2"},
{id:"sheffwed",name:"Sheffield Wednesday",short:"SHW",stadium:"Hillsborough",cap:39000,rep:9,budget:10000000,style:"balanced",formation:"4-4-2"},
{id:"southampton",name:"Southampton",short:"SOU",stadium:"The Dell",cap:15000,rep:9,budget:10000000,style:"balanced",formation:"4-4-2"},
{id:"sunderland",name:"Sunderland",short:"SUN",stadium:"Stadium of Light",cap:48000,rep:10,budget:15000000,style:"direct",formation:"4-4-2"},
{id:"spurs",name:"Tottenham Hotspur",short:"TOT",stadium:"White Hart Lane",cap:36000,rep:14,budget:27000000,style:"technical",formation:"4-4-2"},
{id:"watford",name:"Watford",short:"WAT",stadium:"Vicarage Road",cap:21000,rep:7,budget:7000000,style:"direct",formation:"4-4-2"},
{id:"westham",name:"West Ham United",short:"WHU",stadium:"Upton Park",cap:26000,rep:12,budget:19000000,style:"technical",formation:"5-3-2"},
{id:"wimbledon",name:"Wimbledon",short:"WIM",stadium:"Selhurst Park",cap:26000,rep:8,budget:8000000,style:"direct",formation:"4-4-2"}
];
const CLUBMAP={}; CLUBS.forEach(c=>CLUBMAP[c.id]=c);

/* ---------- DATA: squads ----------
   Format: [name, age, "POS/POS", rating(1-20), nationality?]
   Ratings are era-feel ability levels; full attributes are generated. */
const SQUADS={
arsenal:[
["David Seaman",36,"GK",17],["Alex Manninger",22,"GK",13,"Austria"],
["Lee Dixon",35,"RB",15],["Nigel Winterburn",35,"LB",15],["Silvinho",25,"LB",14,"Brazil"],
["Tony Adams",33,"CB",17],["Martin Keown",33,"CB",16],["Oleg Luzhny",31,"RB/CB",13,"Ukraine"],

/* position compatibility: how well a player covers a slot they don't list */
const POS_RELATED={
GK:[],RB:["RWB","CB"],LB:["LWB","CB"],CB:["RB","LB","DM"],
RWB:["RB","RM"],LWB:["LB","LM"],DM:["CM","CB"],CM:["DM","AM"],

};
function posFit(player,slot){
  if(player.positions.includes(slot))return 1;
  for(const p of player.positions){ if((POS_RELATED[p]||[]).includes(slot))return .82; }
  for(const p of player.positions){ if((POS_RELATED[slot]||[]).includes(p))return .82; }
  if(slot==="GK"||player.positions.includes("GK"))return .3;
  return .62;
}

/* ---------- build player database ---------- */
function genAttributes(rating,positions,seedStr){
  const rng=mulberry32(strHash(seedStr));
  const jit=(n)=>Math.floor(rng()*(n*2+1))-n;
  const groups=positions.map(posGroup);
  const keySet=new Set(); groups.forEach(g=>ARCH[g].forEach(a=>keySet.add(a)));
  const attrs={};
  ATTRS.forEach(a=>{
    let base;
    if(keySet.has(a)) base=rating+jit(2);
    else base=rating-3+jit(3);
    if(a==="pace"){ /* pace tied loosely to rating, more variance */ base=rating-1+jit(4); if(groups.includes("GK"))base=rating-6+jit(2);}
    attrs[a]=clamp(base,1,20);
  });
  if(groups.includes("GK")){attrs.finishing=clamp(2+jit(1),1,5);attrs.tackling=clamp(4+jit(2),1,8);}
  return attrs;
}
function playerValue(rating,age){
  let v=Math.pow(rating,3.1)*1500;
  if(age<=23)v*=1.35; else if(age<=27)v*=1.15; else if(age>=31)v*=0.55; else if(age>=29)v*=0.8;
  return Math.round(v/25000)*25000;
}
function playerWage(rating,age){
  let w=Math.pow(rating,2.4)*22;
  if(age>=30)w*=1.1;
  return Math.round(w/500)*500;
}
function makePlayer(id,clubId,name,age,posStr,rating,nat){
  const positions=posStr.split("/");
  const attrs=genAttributes(rating,positions,id);
  const rng=mulberry32(strHash(id+"_h"));
  return {
    id, clubId, name, age, nationality:nat||"England", positions,
    rating, attributes:attrs,
    value:playerValue(rating,age), wage:playerWage(rating,age),
    morale:ri(12,16), condition:100,
    hidden:{
      potential:clamp(age<=22?rating+2+Math.floor(rng()*4):rating+Math.floor(rng()*2),1,20),
      consistency:clamp(8+Math.floor(rng()*10),1,20),
      injuryProneness:clamp(2+Math.floor(rng()*12),1,20)
    },
    injury:null, listed:false, form:[], seasonGoals:0, seasonAssists:0, seasonApps:0, suspended:0
  };
}

  const rng=mulberry32(99);

    const t=rng();
    if(t<0.3){age=17+Math.floor(rng()*4);rating=8+Math.floor(rng()*5);}        /* prospects */
    else if(t<0.55){age=23+Math.floor(rng()*6);rating=9+Math.floor(rng()*4);}  /* journeymen */
    else if(t<0.8){age=24+Math.floor(rng()*7);rating=10+Math.floor(rng()*5);}  /* imports */
    else {age=31+Math.floor(rng()*5);rating=10+Math.floor(rng()*4);}            /* veterans */
    const nat=POOL_NATIONS[Math.floor(rng()*POOL_NATIONS.length)];
    pool.push(makePlayer("pool_"+i+"_"+ln.toLowerCase(),null,name,age,pos,rating,nat));
  }
  return pool;
}
function buildDatabase(){
  const players=[];
  CLUBS.forEach(c=>{
    SQUADS[c.id].forEach((row,i)=>{
      const id=c.id+"_"+row[0].toLowerCase().replace(/[^a-z]/g,"")+"_"+i;
      players.push(makePlayer(id,c.id,row[0],row[1],row[2],row[3],row[4]));
    });
  });
  return players.concat(buildPool());
}

function expectationRank(club){ /* expected finishing position from reputation */

/* ---------- fixtures: round robin, 38 weeks ---------- */
function genFixtures(){
  const ids=CLUBS.map(c=>c.id);
  const n=ids.length, rounds=n-1, half=n/2;
  const arr=ids.slice(1);
  const firstHalf=[];
  for(let r=0;r<rounds;r++){
    const round=[];
    const left=[ids[0]].concat(arr.slice(0,half-1));
    const right=arr.slice(half-1).reverse();
    for(let i=0;i<half;i++){
      if(r%2===0)round.push({home:left[i],away:right[i]});
      else round.push({home:right[i],away:left[i]});
    }
    firstHalf.push(round);
    arr.push(arr.shift());
  }
  /* shuffle round order a little for variety, then mirror */
  const second=firstHalf.map(round=>round.map(m=>({home:m.away,away:m.home})));
  const all=firstHalf.concat(second);
  return all.map((round,i)=>({week:i+1,matches:round.map(m=>({...m,played:false,hg:0,ag:0}))}));
}

function clubPlayers(clubId){return G.players.filter(p=>p.clubId===clubId);}
function myPlayers(){return clubPlayers(G.clubId);}
function getPlayer(id){return G.players.find(p=>p.id===id);}
function available(p){return !p.injury && p.suspended===0;}
function effRating(p,slot){
  /* effective ability in a slot, factoring fitness/morale */
  const fit=posFit(p,slot);
  const cond=.6+.4*(p.condition/100);
  return p.rating*fit*cond;
}
function autoPickXI(forMe,clubId,formationId){
  const cid=clubId||G.clubId;
  const fid=formationId||(forMe?G.formation:CLUBMAP[cid].formation in FORMMAP?CLUBMAP[cid].formation:"4-4-2");
  const slots=FORMMAP[fid].positions;
  const squad=clubPlayers(cid).filter(available);
  const used=new Set(); const xi=[];
  slots.forEach(slot=>{
    let best=null,bestScore=-1;
    squad.forEach(p=>{
      if(used.has(p.id))return;
      const s=effRating(p,slot);
      if(s>bestScore){bestScore=s;best=p;}
    });
    if(best){used.add(best.id);xi.push(best.id);}else xi.push(null);
  });
  if(forMe){
    G.lineup=xi;
    G.subs=squad.filter(p=>!used.has(p.id))
      .sort((a,b)=>b.rating-a.rating).slice(0,5).map(p=>p.id);
  }
  return xi;
}

/* =========================================================
   MATCH ENGINE
   ========================================================= */
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function teamStrength(clubId,xiIds,tactics,formationId,isHome){
  const slots=FORMMAP[formationId].positions;
  const xi=xiIds.map(id=>id?getPlayer(id):null).filter(Boolean);
  if(xi.length===0)return{def:1,mid:1,att:1,overall:1,xi:[]};
  const get=(p,a)=>p.attributes[a];
  const condF=p=>.55+.45*(p.condition/100);
  const fitOf=(p,i)=>posFit(p,slots[i]||"CM");

  let def=[],mid=[],att=[];
  xi.forEach((p,i)=>{
    const slot=slots[i]||"CM";
    const g=posGroup(slot);
    const mult=condF(p)*fitOf(p,i);
    if(g==="GK"){
      def.push((p.rating*1.25)*mult); /* keeper quality matters */
    }else if(g==="DEF"||g==="FB"){
      def.push(avg([get(p,"tackling"),get(p,"heading"),get(p,"strength"),get(p,"workRate"),get(p,"leadership")])*mult);
      mid.push(avg([get(p,"passing"),get(p,"stamina")])*mult*.4);
    }else if(g==="MID"){
      mid.push(avg([get(p,"passing"),get(p,"technique"),get(p,"creativity"),get(p,"workRate"),get(p,"stamina")])*mult);
      def.push(get(p,"tackling")*mult*.35);
      att.push(avg([get(p,"creativity"),get(p,"technique")])*mult*.3);
    }else if(g==="WIDE"){
      mid.push(avg([get(p,"passing"),get(p,"technique"),get(p,"creativity"),get(p,"stamina")])*mult*.85);
      att.push(avg([get(p,"pace"),get(p,"creativity"),get(p,"technique")])*mult*.55);
    }else{
      att.push(avg([get(p,"finishing"),get(p,"pace"),get(p,"technique"),get(p,"creativity"),get(p,"heading")])*mult);
      mid.push(get(p,"workRate")*mult*.2);
    }
  });
  let D=avg(def),M=avg(mid),A=avg(att);

  /* tactics modifiers */
  const t=tactics;
  if(t.mentality==="Attacking"){A*=1.12;D*=.9;}
  if(t.mentality==="Defensive"){D*=1.12;A*=.88;}
  if(t.pressing==="High"){M*=1.07;}
  if(t.pressing==="Low"){M*=.95;D*=1.03;}
  if(t.tempo==="Fast"){A*=1.04;}
  if(t.line==="High"){M*=1.05;D*=.94;}
  if(t.line==="Deep"){D*=1.06;M*=.96;}
  if(isHome){D*=1.06;M*=1.08;A*=1.08;}

  /* short XI penalty */
  const shortage=11-xi.length;
  if(shortage>0){const pen=1-shortage*.07;D*=pen;M*=pen;A*=pen;}

  return{def:D,mid:M,att:A,overall:(D+M+A)/3,xi};
}

function poisson(lambda){
  let L=Math.exp(-lambda),k=0,p=1;
  do{k++;p*=rnd();}while(p>L);
  return k-1;
}

const COMM_GOAL=[
"GOAL. {p} finishes low past the keeper.",
"GOAL. {p} rises highest and heads home.",
"GOAL. {p} drills it into the bottom corner.",
"GOAL. {p} taps in from close range.",
"GOAL. {p} curls a beauty into the top corner.",
"GOAL. {p} slots home after a flowing move.",
"GOAL. {p} pounces on a loose ball and scores.",
"GOAL. {p} lashes it in off the bar."
];
const COMM_CHANCE=[
"{p} swings in a dangerous cross. Headed over.",
"{p} shoots from distance. Just wide.",
"{p} breaks clear but the keeper stands tall.",
"{p} curls a free-kick inches over the bar.",
"Good work from {p}. The shot is blocked.",
"{p} forces a smart save at the near post."
];
const COMM_CARD=[
"{p} goes into the book after a late challenge.",
"{p} is cautioned for a cynical foul.",
"{p} sees yellow for dissent."
];
const INJURY_NAMES=["bruised knee","pulled hamstring","ankle knock","groin strain","twisted knee","dead leg","tight calf"];

function pickWeighted(items,weightFn){
  const ws=items.map(weightFn);
  const total=ws.reduce((a,b)=>a+b,0);
  if(total<=0)return items[Math.floor(rnd()*items.length)];
  let r=rnd()*total;
  for(let i=0;i<items.length;i++){r-=ws[i];if(r<=0)return items[i];}
  return items[items.length-1];
}

function aiSquadPick(clubId){
  const fid=CLUBMAP[clubId].formation in FORMMAP?CLUBMAP[clubId].formation:"4-4-2";
  const xi=autoPickXI(false,clubId,fid);
  const used=new Set(xi.filter(Boolean));
  const rest=clubPlayers(clubId).filter(p=>available(p)&&!used.has(p.id));
  const gk=rest.filter(p=>p.positions.includes("GK")).sort((a,b)=>b.rating-a.rating)[0];
  const outfield=rest.filter(p=>p!==gk).sort((a,b)=>b.rating-a.rating);
  const bench=(gk?[gk]:[]).concat(outfield).slice(0,5).map(p=>p.id);
  return{xi,bench,fid};
}
function computeMyBench(){
  const used=new Set(G.lineup.filter(Boolean));
  const rest=myPlayers().filter(p=>available(p)&&!used.has(p.id));
  const gk=rest.filter(p=>p.positions.includes("GK")).sort((a,b)=>b.rating-a.rating)[0];
  const outfield=rest.filter(p=>p!==gk).sort((a,b)=>b.rating-a.rating);
  G.subs=(gk?[gk]:[]).concat(outfield).slice(0,5).map(p=>p.id);
  return G.subs.slice();
}

/* roster entry: {p, slot, on, off, started} */
function takeBest(bench,slot,strict){
  let best=null,bi=-1,score=-1;
  bench.forEach((p,i)=>{
    if(slot==="GK"&&!p.positions.includes("GK"))return;
    if(slot!=="GK"&&p.positions.includes("GK")&&p.positions.length===1)return;
    const fit=posFit(p,slot);
    if(strict&&fit<.8)return; /* tactical subs must be positionally correct */
    const s=p.rating*fit;
    if(s>score){score=s;best=p;bi=i;}
  });
  if(bi>-1)bench.splice(bi,1);
  return best;
}

function simMatch(opts){
  const{homeId,awayId,homeXI,awayXI,homeBench,awayBench,homeTac,awayTac,homeForm,awayForm}=opts;
  const H=teamStrength(homeId,homeXI,homeTac,homeForm,true);
  const A=teamStrength(awayId,awayXI,awayTac,awayForm,false);

  /* midfield battle shifts attacking supply */
  const midEdge=clamp((H.mid-A.mid)/14,-.5,.5);
  let hl=1.68*Math.pow(Math.max(.25,H.att/Math.max(1,A.def)),1.55)*(1+midEdge*.5);
  let al=1.40*Math.pow(Math.max(.25,A.att/Math.max(1,H.def)),1.55)*(1-midEdge*.5);
  if(homeTac.mentality==="Attacking")al*=1.08;
  if(homeTac.mentality==="Defensive")al*=.92;
  if(awayTac.mentality==="Attacking")hl*=1.08;
  if(awayTac.mentality==="Defensive")hl*=.92;
  hl=clamp(hl,.15,4.4); al=clamp(al,.12,4.2);
  const hg=poisson(hl), ag=poisson(al);

  const events=[]; const scorers={home:[],away:[]}; const injuries=[];
  const usedMins=new Set();
  function freeMin(lo,hi){let m,tries=0;do{m=ri(lo||2,hi||93);tries++;}while(usedMins.has(m)&&tries<40);usedMins.add(m);return m;}

  /* build rosters with substitutions */
  function makeRoster(xiIds,benchIds,formId,side,oppTac){
    const slots=FORMMAP[formId].positions;
    const entries=xiIds.map((id,i)=>id?{p:getPlayer(id),slot:slots[i]||"CM",on:0,off:94,started:true}:null).filter(e=>e&&e.p);
    const bench=(benchIds||[]).map(id=>getPlayer(id)).filter(Boolean);
    let subsLeft=3;
    /* injuries force subs */
    entries.slice().forEach(e=>{
      const p=e.p;
      let risk=.008+(p.hidden.injuryProneness/20)*.022+(p.age>=32?.008:0)+((100-p.condition)/100)*.03;
      if(oppTac.pressing==="High")risk*=1.25;
      if(rnd()<risk){
        const min=freeMin(8,82);
        const name=pick(INJURY_NAMES), weeks=ri(1,5);
        injuries.push({player:p,name,weeks,side});
        events.push({min,type:"injury",side,text:p.name+" pulls up injured. "+name.charAt(0).toUpperCase()+name.slice(1)+"."});
        e.off=min;
        if(subsLeft>0){
          const rep=takeBest(bench,e.slot,false);
          if(rep){entries.push({p:rep,slot:e.slot,on:min,off:94,started:false});subsLeft--;
            events.push({min:Math.min(min+1,93),type:"sub",side,text:"Sub: "+rep.name+" replaces the injured "+p.name+"."});}
        }
      }
    });
    /* tactical subs for tired legs (position-correct only) */
    const tired=entries.filter(e=>e.started&&e.off===94&&e.slot!=="GK")
      .sort((a,b)=>(a.p.condition+a.p.attributes.stamina*2)-(b.p.condition+b.p.attributes.stamina*2));
    for(const e of tired){
      if(subsLeft<=0)break;
      const fatigue=(100-e.p.condition)+(20-e.p.attributes.stamina)*2;
      if(fatigue>=26&&rnd()<.6){
        const rep=takeBest(bench,e.slot,true);
        if(rep){
          const min=freeMin(58,84);
          e.off=min;
          entries.push({p:rep,slot:e.slot,on:min,off:94,started:false});
          subsLeft--;
          events.push({min,type:"sub",side,text:"Sub: "+rep.name+" comes on for "+e.p.name+" ("+e.slot+")."});
        }
      }
    }
    return entries;
  }
  const homeR=makeRoster(homeXI,homeBench,homeForm,"home",awayTac);
  const awayR=makeRoster(awayXI,awayBench,awayForm,"away",homeTac);
  const onPitch=(R,min)=>R.filter(e=>e.on<=min&&min<e.off);

  /* goals: scorer must be on the pitch, never the goalkeeper */
  function addGoals(n,R,side){
    for(let i=0;i<n;i++){
      const min=freeMin();
      const cands=onPitch(R,min).filter(e=>e.slot!=="GK"&&!(e.p.positions.length===1&&e.p.positions[0]==="GK"));
      if(!cands.length)continue;
      const se=pickWeighted(cands,e=>{
        const g=posGroup(e.slot);
        const base=g==="ATT"?8:g==="WIDE"?3:g==="MID"?2:.5;
        return base*(1+e.p.attributes.finishing/10);
      });
      const scorer=se.p;
      let assist=null;
      if(rnd()<.72){
        const others=onPitch(R,min).filter(e=>e.p!==scorer&&e.slot!=="GK");
        if(others.length)assist=pickWeighted(others,e=>1+e.p.attributes.creativity/8+e.p.attributes.passing/10).p;
      }
      scorers[side].push({player:scorer,min,assist});
      events.push({min,type:"goal",side,text:COMM_GOAL[Math.floor(rnd()*COMM_GOAL.length)].replace("{p}",scorer.name)+(assist?" ("+assist.name+" assist)":"")});
      scorer.seasonGoals++; if(assist)assist.seasonAssists++;
    }
  }
  addGoals(hg,homeR,"home"); addGoals(ag,awayR,"away");

  /* near misses */
  const nChance=ri(2,4);
  for(let i=0;i<nChance;i++){
    const side=rnd()<.55?"home":"away";
    const R=side==="home"?homeR:awayR;
    const min=freeMin();
    const cands=onPitch(R,min).filter(e=>e.slot!=="GK");
    if(!cands.length)continue;
    const e=pickWeighted(cands,x=>1+x.p.attributes.finishing/8);
    events.push({min,type:"chance",side,text:COMM_CHANCE[Math.floor(rnd()*COMM_CHANCE.length)].replace("{p}",e.p.name)});
  }
  /* cards */
  const cards={home:[],away:[]};
  [["home",homeR,homeTac],["away",awayR,awayTac]].forEach(([side,R,tac])=>{
    let n=rnd()<.6?ri(0,2):0;
    if(tac.pressing==="High"&&rnd()<.35)n++;
    for(let i=0;i<n;i++){
      const min=freeMin();
      const cands=onPitch(R,min);
      if(!cands.length)continue;
      const e=pickWeighted(cands,x=>1+(20-x.p.attributes.tackling)/10+(["CB","DM","RB","LB"].some(z=>x.p.positions.includes(z))?1:0));
      cards[side].push(e.p);
      events.push({min,type:"card",side,text:COMM_CARD[Math.floor(rnd()*COMM_CARD.length)].replace("{p}",e.p.name)});
    }
  });

  events.sort((a,b)=>a.min-b.min);

  /* ratings + participants */
  const ratings={}; const participants=[];
  function rate(R,side,gf,ga){
    R.forEach(e=>{
      const mins=Math.min(e.off,90)-Math.min(e.on,90);
      if(mins<=0)return;
      let r=6+(e.p.rating-12)*.1+(rnd()*1.6-.8);
      if(!e.started)r-=.15;
      scorers[side].forEach(s=>{if(s.player===e.p)r+=1;if(s.assist===e.p)r+=.5;});
      if(ga===0&&["GK","DEF","FB"].includes(posGroup(e.slot)))r+=.6;
      if(gf>ga)r+=.3; if(gf<ga)r-=.4;
      ratings[e.p.id]=clamp(Math.round(r*10)/10,3,10);
      participants.push({id:e.p.id,side,mins,started:e.started});
    });
  }
  rate(homeR,"home",hg,ag); rate(awayR,"away",ag,hg);
  let motm=null,best=-1;
  participants.forEach(pt=>{if(ratings[pt.id]>best){best=ratings[pt.id];motm=getPlayer(pt.id);}});

  const club=CLUBMAP[homeId];
  const attendance=Math.round(club.cap*(0.72+rnd()*0.26+CLUBMAP[awayId].rep*0.003));

  return{homeId,awayId,hg,ag,events,scorers,cards,injuries,ratings,motm,participants,
    attendance:Math.min(attendance,club.cap),
    homeXI:homeR.filter(e=>e.started).map(e=>e.p.id),
    awayXI:awayR.filter(e=>e.started).map(e=>e.p.id)};
}

/* ---------- post-match processing ---------- */
function applyResultToTable(homeId,awayId,hg,ag){
  const h=G.table[homeId],a=G.table[awayId];
  h.p++;a.p++;h.gf+=hg;h.ga+=ag;a.gf+=ag;a.ga+=hg;
  if(hg>ag){h.w++;a.l++;h.pts+=3;h.form.push("W");a.form.push("L");}
  else if(hg<ag){a.w++;h.l++;a.pts+=3;a.form.push("W");h.form.push("L");}
  else{h.d++;a.d++;h.pts++;a.pts++;h.form.push("D");a.form.push("D");}
  if(h.form.length>6)h.form.shift(); if(a.form.length>6)a.form.shift();
}
function sortedTable(){
  return CLUBS.map(c=>({club:c,...G.table[c.id],gd:G.table[c.id].gf-G.table[c.id].ga}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.club.name.localeCompare(b.club.name));
}
function leaguePos(clubId){return sortedTable().findIndex(r=>r.club.id===clubId)+1;}

function postMatchUpdates(res){
  /* condition + apps + form for everyone who played (mins-weighted) */
  const played=new Set();
  res.participants.forEach(pt=>{
    const p=getPlayer(pt.id); if(!p)return;
    played.add(pt.id);
    const drain=Math.max(6,Math.round(ri(16,26)*pt.mins/90));
    p.condition=clamp(p.condition-drain,20,100);
    p.seasonApps++;
    if(res.ratings[p.id]!==undefined){p.form.push(res.ratings[p.id]);if(p.form.length>6)p.form.shift();}
  });
  /* injuries */
  res.injuries.forEach(inj=>{
    inj.player.injury={name:inj.name,weeks:inj.weeks};
    if(inj.player.clubId===G.clubId)addNews(inj.player.name+" injured: "+inj.name+". Out around "+inj.weeks+" week"+(inj.weeks>1?"s":"")+".");
  });
}

function weeklyRecovery(){
  G.players.forEach(p=>{
    p.condition=clamp(p.condition+ri(22,34),0,100);
    if(p.injury){p.injury.weeks--;if(p.injury.weeks<=0){p.injury=null;if(p.clubId===G.clubId)addNews(p.name+" is back in training.");}}
    if(p.suspended>0)p.suspended--;
  });
}

/* ---------- player development (every 4 weeks) ---------- */
function developPlayers(){
  if(G.week%4!==0)return;
  G.players.forEach(p=>{
    if(p.age<=23&&p.rating<p.hidden.potential&&rnd()<.3){
      p.rating=clamp(p.rating+1,1,20);
      const a=pick(ATTRS); p.attributes[a]=clamp(p.attributes[a]+1,1,20);
      p.value=playerValue(p.rating,p.age);
      if(p.clubId===G.clubId&&rnd()<.6)addNews(p.name+" is improving in training.");
    } else if(p.age>=31&&rnd()<.18){
      p.rating=clamp(p.rating-1,1,20);
      const a=pick(["pace","stamina","strength"]); p.attributes[a]=clamp(p.attributes[a]-1,1,20);
      p.value=playerValue(p.rating,p.age);
    }
  });
}

/* ---------- board confidence ---------- */
function updateBoard(){
  const club=CLUBMAP[G.clubId];
  const exp=expectationRank(club);
  const pos=leaguePos(G.clubId);
  const diff=exp-pos; /* positive = overachieving */
  G.boardConf=clamp(G.boardConf+diff*1.2+(diff>=0?1:-1),5,100);
  if(G.boardConf<20&&G.week>10)addNews("The board is losing patience. Results must improve.");
}

/* ---------- transfers ---------- */
function listedPlayers(){
  /* AI clubs list fringe + the pool */
  return G.players.filter(p=>{
    if(p.clubId===G.clubId)return false;
    if(p.clubId===null)return true;
    return p.listed;
  });
}
function initTransferMarket(){
  /* AI clubs transfer-list some fringe players, deterministic-ish */
  CLUBS.forEach(c=>{
    if(c.id===G.clubId)return;
    const squad=clubPlayers(c.id).sort((a,b)=>a.rating-b.rating);
    squad.slice(0,3).forEach(p=>{if(rnd()<.6)p.listed=true;});
  });
}
function fairMultiple(p){
  /* what multiple of value a club realistically wants */
  if(p.clubId===null)return .8;        /* free agents: bargain */
  if(p.listed)return .9;               /* listed: below value gets it done */
  let need=1.1;                        /* unlisted: small premium */
  if(p.rating>=16)need+=.15;           /* stars cost a bit more */
  if(p.rating>=18)need+=.1;
  if(p.age<=22&&p.hidden.potential>=15)need+=.1;
  return need;
}
function offerProbability(p,offer){
  const ratio=offer/Math.max(1,p.value);
  let prob=(ratio-fairMultiple(p))*2.2+.7;
  const myRep=CLUBMAP[G.clubId].rep;
  const theirRep=p.clubId?CLUBMAP[p.clubId].rep:6;
  prob+=(myRep-theirRep)*.025;
  return clamp(prob,.05,.97);
}
function makeOffer(playerId,amount){
  const p=getPlayer(playerId);
  if(amount>G.budget)return{ok:false,msg:"You can't afford that offer. Budget: "+money(G.budget)+"."};
  if(p.clubId&&clubPlayers(p.clubId).length<=15)
    return{ok:false,msg:CLUBMAP[p.clubId].name+" won't sell. Their squad is too thin."};
  const prob=offerProbability(p,amount);
  if(rnd()<prob){
    G.budget-=amount;
    const from=p.clubId?CLUBMAP[p.clubId].name:"a free transfer";
    p.clubId=G.clubId; p.listed=false; p.condition=Math.max(p.condition,85);
    addNews("Signed: "+p.name+" joins from "+from+" for "+money(amount)+".");
    saveGame();
    return{ok:true,msg:p.name+" has signed for "+CLUBMAP[G.clubId].name+"!"};
  }
  /* counter or reject */
  if(p.clubId&&rnd()<.65){
    const counter=Math.round(p.value*fairMultiple(p)*(1.0+rnd()*.08)/25000)*25000;
    if(counter>amount)return{ok:false,counter,msg:CLUBMAP[p.clubId].name+" rejected the bid. They want around "+money(counter)+"."};
  }
  return{ok:false,msg:"Offer rejected. Try a higher bid."};
}
function toggleTransferList(playerId){
  const p=getPlayer(playerId);
  p.listed=!p.listed;
  if(p.listed)addNews(p.name+" placed on the transfer list.");
  else addNews(p.name+" removed from the transfer list.");
  saveGame();
}
function weeklyIncomingOffers(){
  /* chance of AI bids for listed (or star unsettled) players */
  myPlayers().forEach(p=>{
    if(p.listed&&rnd()<.45){
      const bidder=pick(CLUBS.filter(c=>c.id!==G.clubId&&c.rep>=p.rating-4));
      if(!bidder)return;
      const amount=Math.round(p.value*(.8+rnd()*.45)/25000)*25000;
      G.offersIn.push({playerId:p.id,club:bidder.name,amount,week:G.week});
      addNews(bidder.name+" have bid "+money(amount)+" for "+p.name+".");
    }
  });
  if(G.offersIn.length>6)G.offersIn=G.offersIn.slice(-6);
}
function respondOffer(idx,accept){
  const o=G.offersIn[idx]; if(!o)return;
  G.offersIn.splice(idx,1);
  const p=getPlayer(o.playerId);
  if(accept&&p&&p.clubId===G.clubId){
    G.budget+=o.amount;
    p.clubId=null; p.listed=true;
    G.lineup=G.lineup.map(id=>id===p.id?null:id);
    G.subs=G.subs.filter(id=>id!==p.id);
    addNews("Sold: "+p.name+" to "+o.club+" for "+money(o.amount)+".");
  } else if(p){
    addNews("You rejected "+o.club+"'s bid for "+p.name+".");
  }
  saveGame();
}

/* ---------- AI weekly squad churn (light) ---------- */
function aiTransferActivity(){
  if(rnd()<.3){
    const pool=G.players.filter(p=>p.clubId===null&&p.rating>=11);
    if(pool.length){
      const p=pick(pool);
      const buyers=CLUBS.filter(c=>c.id!==G.clubId&&c.rep>=p.rating-3);
      if(buyers.length){
        const b=pick(buyers);
        p.clubId=b.id;
        addNews(b.name+" sign "+p.name+" ("+p.positions[0]+").");
      }
    }
  }
}

/* =========================================================
   PLAY NEXT MATCH (the main loop)
   ========================================================= */
function validateLineup(){
  const ids=G.lineup.filter(Boolean);
  if(ids.length<11)return"You need 11 players in the XI.";
  const set=new Set(ids);
  if(set.size!==11)return"A player is selected twice.";
  for(const id of ids){
    const p=getPlayer(id);
    if(!p||p.clubId!==G.clubId)return"A selected player has left the club.";
    if(p.injury)return p.name+" is injured and can't play.";
    if(p.suspended>0)return p.name+" is suspended.";
  }
  if(!getPlayer(G.lineup[0]).positions.includes("GK")){
    const gkLeft=myPlayers().filter(p=>available(p)&&p.positions.includes("GK")&&!G.lineup.includes(p.id));
    if(gkLeft.length)return"Your first slot must be a goalkeeper.";
    /* every keeper unavailable: allow an emergency outfield keeper */
  }
  return null;
}

function playNextMatch(){
  if(G.seasonOver)return;
  const err=validateLineup();
  if(err){toast(err);go("tactics");return;}
  const round=G.fixtures[G.week-1];
  let myResult=null;
  round.matches.forEach(m=>{
    const mine=m.home===G.clubId||m.away===G.clubId;
    let res;
    if(mine){
      const meHome=m.home===G.clubId;
      const oppId=meHome?m.away:m.home;
      const opp=aiSquadPick(oppId);
      const myBench=computeMyBench();
      const oppTac=aiTactics(oppId);
      if(meHome)res=simMatch({homeId:m.home,awayId:m.away,homeXI:G.lineup,awayXI:opp.xi,homeBench:myBench,awayBench:opp.bench,homeTac:G.tactics,awayTac:oppTac,homeForm:G.formation,awayForm:opp.fid});
      else res=simMatch({homeId:m.home,awayId:m.away,homeXI:opp.xi,awayXI:G.lineup,homeBench:opp.bench,awayBench:myBench,homeTac:oppTac,awayTac:G.tactics,homeForm:opp.fid,awayForm:G.formation});
      myResult=res;
    }else{
      const h=aiSquadPick(m.home), a=aiSquadPick(m.away);
      res=simMatch({homeId:m.home,awayId:m.away,homeXI:h.xi,awayXI:a.xi,homeBench:h.bench,awayBench:a.bench,homeTac:aiTactics(m.home),awayTac:aiTactics(m.away),homeForm:h.fid,awayForm:a.fid});
    }
    m.played=true;m.hg=res.hg;m.ag=res.ag;
    applyResultToTable(m.home,m.away,res.hg,res.ag);
    postMatchUpdates(res);
  });
  G.results.push({week:G.week,res:myResult});
  updateBoard();
  developPlayers();
  G.week++;
  if(G.week>38){
    G.seasonOver=true;
    finishSeason();
  } else {
    weeklyRecovery();
    weeklyIncomingOffers();
    aiTransferActivity();
  }
  /* drop departed/injured players from lineup */
  G.lineup=G.lineup.map(id=>{const p=id?getPlayer(id):null;return p&&p.clubId===G.clubId&&!p.injury&&p.suspended===0?id:null;});
  saveGame();
  screenData=myResult;
  go("matchreport");
}

function aiTactics(clubId){
  const c=CLUBMAP[clubId];
  return{
    mentality:c.style==="attacking"?"Attacking":c.style==="direct"?"Balanced":"Balanced",
    passing:c.style==="direct"?"Direct":c.style==="technical"?"Short":"Mixed",
    pressing:c.style==="pressing"?"High":"Medium",
    tempo:"Normal",line:"Normal"
  };
}

function finishSeason(){
  const pos=leaguePos(G.clubId);
  const club=CLUBMAP[G.clubId];
  let msg;
  if(pos===1)msg="CHAMPIONS! "+club.name+" win the 1999/2000 Premier League title!";
  else if(pos<=3)msg="A superb season. "+club.name+" finish "+ordinal(pos)+".";
  else if(pos>=18)msg=club.name+" finish "+ordinal(pos)+" and are relegated. The board is not happy.";
  else msg=club.name+" finish the season in "+ordinal(pos)+" place.";
  addNews(msg);
  /* hall of fame */
  try{
    const hof=JSON.parse(localStorage.getItem(HOF_KEY)||"[]");
    const t=sortedTable().find(r=>r.club.id===G.clubId);
    hof.unshift({club:club.name,pos,pts:t.pts,w:t.w,d:t.d,l:t.l,date:new Date().toLocaleDateString("en-GB")});
    localStorage.setItem(HOF_KEY,JSON.stringify(hof.slice(0,10)));
  }catch(e){}
}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

  try{localStorage.setItem(SAVE_KEY,JSON.stringify(G));}catch(e){}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function toast(msg){

  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);
}
function statClass(v,max){const r=v/(max||20);return r>=.7?"s-hi":r>=.45?"s-mid":"s-lo";}
function pill(v,max){return '<span class="statpill '+statClass(v,max)+'">'+v+'</span>';}
function condPill(c){return '<span class="statpill '+(c>=85?"s-hi":c>=65?"s-mid":"s-lo")+'">'+c+'%</span>';}

window.setLineup=function(slot,pid){
  if(pid){
    const dup=G.lineup.indexOf(pid);
    if(dup>-1&&dup!==slot)G.lineup[dup]=null;

  G.lineup[slot]=pid||null;
  G.subs=G.subs.filter(id=>id!==pid);
  saveGame();render();
};

window.openBidModal=function(pid){
  const p=getPlayer(pid);
  const wrap=document.createElement("div");
  wrap.className="modalwrap";
  wrap.onclick=e=>{if(e.target===wrap){wrap.remove();render();}};
  const guide=p.clubId===null?"Free agent — a bid around value should do it."
    :p.listed?"Transfer listed — a bid around value should do it."
    :"Not for sale — expect to pay well above value.";
  const q1=Math.round(p.value/25000)*25000;
  const q2=Math.round(p.value*1.25/25000)*25000;
  const q3=Math.round(p.value*1.6/25000)*25000;
  wrap.innerHTML=`
  <div class="modal" style="max-width:420px;">
    <button class="closex" onclick="this.closest('.modalwrap').remove();render();">×</button>

      <div class="bigstat"><div class="v">${money(p.value)}</div><div class="l">Value</div></div>

      <button class="btn small ghost" onclick="document.getElementById('bidAmt').value=${q2};">${money(q2)}</button>
      <button class="btn small ghost" onclick="document.getElementById('bidAmt').value=${q3};">${money(q3)}</button>
    </div>
    <div style="display:flex;gap:8px;">
      <input id="bidAmt" type="number" inputmode="numeric" min="0" step="25000" value="${q1}"
        style="flex:1;padding:10px 12px;border-radius:9px;border:1.5px solid var(--grey);font-size:15px;">
      <button class="btn gold" onclick="submitBid('${p.id}')">Submit Bid</button>
    </div>
    <div id="bidResult" style="margin-top:12px;"></div>
  </div>`;
  document.body.appendChild(wrap);
};
window.submitBid=function(pid){
  const inp=document.getElementById("bidAmt");
  const amount=Math.round(Number(inp.value));
  const box=document.getElementById("bidResult");
  if(!amount||amount<=0){box.innerHTML='<span class="tag inj">Enter a valid amount.</span>';return;}
  const out=makeOffer(pid,amount);
  if(out.ok){
    box.innerHTML='<div class="tag" style="background:rgba(46,90,68,.18);color:var(--green);font-size:13px;padding:8px 12px;">'+esc(out.msg)+'</div>'
      +'<div style="margin-top:10px;"><button class="btn small green" onclick="this.closest(\'.modalwrap\').remove();render();">Done</button></div>';
  }else if(out.counter){
    box.innerHTML='<div class="tag listed" style="font-size:13px;padding:8px 12px;">'+esc(out.msg)+'</div>'
      +'<div style="margin-top:10px;display:flex;gap:8px;">'
      +'<button class="btn small gold" onclick="document.getElementById(\'bidAmt\').value='+out.counter+';submitBid(\''+pid+'\');">Meet asking price ('+money(out.counter)+')</button>'
      +'<button class="btn small ghost" onclick="this.closest(\'.modalwrap\').remove();render();">Walk away</button></div>';
  }else{
    box.innerHTML='<div class="tag inj" style="font-size:13px;padding:8px 12px;">'+esc(out.msg)+'</div>';
  }
};

      <div class="confbar"><i style="width:${conf}%;background:${confCol};"></i></div>
      <div class="muted" style="margin-top:10px;">Expectation: ${expectationText(club)}.</div>
      <div class="muted">${conf>=70?"The board is delighted with your work.":conf>=45?"The board is satisfied for now.":conf>=20?"The board expects better results soon.":"Your job is on the line."}</div>
    </div>
  </div>
  <div class="card">
    <h3>Save Game</h3>
    <div class="muted" style="margin-bottom:10px;">The game auto-saves after every match and transfer. Saves live in this browser on this device.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn small green" onclick="saveGame();toast('Game saved.');">Save Now</button>
      <button class="btn small ghost" onclick="go('landing')">Main Menu</button>
      <button class="btn small burgundy" onclick="if(confirm('Delete your save and start over?')){localStorage.removeItem(SAVE_KEY);go('landing');}">Delete Save</button>
    </div>
  </div>`;
}

/* ---------- match report ---------- */
function rMatchReport(el){
  const r=screenData;
  if(!r){go("home");return;}
  const home=CLUBMAP[r.homeId],away=CLUBMAP[r.awayId];
  const meHome=r.homeId===G.clubId;
  const myG=meHome?r.hg:r.ag, theirG=meHome?r.ag:r.hg;
  const verdict=myG>theirG?"A good day at the office.":myG<theirG?"One to forget.":"Honours even.";
  function scorerList(side){
    return r.scorers[side].sort((a,b)=>a.min-b.min).map(s=>esc(s.player.name)+" "+s.min+"'").join(", ");
  }
  el.innerHTML=`
  <div class="card">
    <h3>Full Time <span class="sub">${esc(home.stadium)} · Att ${r.attendance.toLocaleString()}</span></h3>
    <div class="scoreline">
      <div class="t" style="text-align:right;">${esc(home.name)}</div>
      <div class="s">${r.hg} - ${r.ag}</div>
      <div class="t" style="text-align:left;">${esc(away.name)}</div>
    </div>
    <div class="scorers">
      <div class="home">${scorerList("home")}</div>
      <div>${scorerList("away")}</div>
    </div>
    <div style="text-align:center;" class="muted">${verdict} ${r.motm?`Man of the match: <b>${esc(r.motm.name)}</b> (${r.ratings[r.motm.id].toFixed(1)})`:""}</div>
  </div>
  <div class="grid2">
    <div class="card">
      <h3>Match Events</h3>
      ${r.events.length?r.events.map(e=>`
        <div class="eventline ${e.type==='goal'?('goal'+((e.side==='home')!==(meHome)?' them':'')):e.type==='card'?'card-ev':e.type==='injury'?'inj':''}">
          <span class="min">${e.min}'</span>${esc(e.text)}
        </div>`).join(""):'<div class="muted">A quiet game.</div>'}
      <div class="eventline"><span class="min">90'</span>Full time. ${esc(verdict)}</div>
    </div>
    <div class="card">
      <h3>Player Ratings <span class="sub">${esc(meHome?home.short:away.short)}</span></h3>
      <div class="ratingsgrid">
        ${(r.participants||[]).filter(pt=>pt.side===(meHome?"home":"away")).map(pt=>{
          const p=getPlayer(pt.id); if(!p)return"";
          const rt=r.ratings[pt.id]||6;
          return `<span>${esc(p.name)}${pt.started?"":" <span class='muted'>(sub)</span>"}</span><span class="muted">${p.positions[0]}</span><b style="color:${rt>=7.5?'var(--green)':rt<6?'var(--burgundy)':'var(--navy)'};">${rt.toFixed(1)}</b>`;
        }).join("")}
      </div>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn green big" style="flex:1;min-width:200px;" onclick="go('home')">${G.seasonOver?"Season Summary":"Continue"}</button>
    <button class="btn ghost" onclick="go('table')">League Table</button>
  </div>`;
}

/* ---------- boot ---------- */
applyTheme(getTheme());
render();


</script>
</body>
</html>
